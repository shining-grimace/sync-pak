name: Continuous build

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes libfontconfig1-dev
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --features feasibility-probes,provider-probes --locked -- -D warnings
      - run: cargo test --all-targets --features feasibility-probes,provider-probes --locked

  desktop:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes libfontconfig1-dev
      - run: cargo build --all-targets --features feasibility-probes --locked

  flatpak:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: sync-pak.flatpak
          manifest-path: com.shininggrimace.SyncPak.yml
      - uses: actions/upload-artifact@v4
        with:
          name: syncpak-flatpak-feasibility-package
          path: sync-pak.flatpak
          if-no-files-found: error

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Install Android SDK platform
        run: sdkmanager "platforms;android-36.1" "build-tools;36.0.0" "ndk;28.2.13676358"
      - name: Select Android NDK
        run: echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> "$GITHUB_ENV"
      - name: Build ARM64 debug APK
        run: ./android/gradlew --project-dir android :app:assembleDebug --no-daemon -PfeasibilityProbes=true
      - uses: actions/upload-artifact@v4
        with:
          name: syncpak-android-folder-picker-probe
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

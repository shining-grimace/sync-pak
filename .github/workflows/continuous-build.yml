name: Continuous build

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes libfontconfig1-dev
      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets --features feasibility-probes --locked -- -D warnings
      - run: cargo test --all-targets --features feasibility-probes --locked

  desktop:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes libfontconfig1-dev
      - run: cargo build --all-targets --features feasibility-probes --locked

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android
      - uses: Swatinem/rust-cache@v2
      - name: Install Android SDK platform
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - name: Install APK packager
        run: cargo install cargo-apk --version 0.10.0 --locked
      - name: Build ARM64 debug APK
        run: cargo apk build --target aarch64-linux-android --lib
      - uses: actions/upload-artifact@v4
        with:
          name: syncpak-android-debug
          path: target/debug/apk/*.apk
          if-no-files-found: error
